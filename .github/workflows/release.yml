name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version matches tag
        run: |
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('custom_components/ha_nordpool_gas/manifest.json'))['version'])")
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ manifest.json says $MANIFEST_VERSION but tag is $TAG_VERSION"
            exit 1
          fi
          echo "✅ Version $MANIFEST_VERSION matches tag"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
